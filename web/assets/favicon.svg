<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SyncPad">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c5cf0"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#0d0b14"/>
  <rect x="24" y="24" width="464" height="464" rx="96" fill="url(#bg)"/>
  <!-- Two offset editor carets merging: the "sync" idea. -->
  <g stroke="#0d0b14" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- left angle bracket -->
    <path d="M196 168 L128 256 L196 344"/>
    <!-- right angle bracket -->
    <path d="M316 168 L384 256 L316 344"/>
  </g>
  <!-- center caret bar (the shared cursor) -->
  <rect x="242" y="150" width="28" height="212" rx="14" fill="#ece9f5"/>
</svg>
